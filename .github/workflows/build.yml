name: Build Godot Sandbox

on:
  push:
    branches: [ main, dev ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build (Godot 4.3)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y godot4 cmake build-essential ninja-build
        python -m pip install --upgrade pip
        pip install setuptools wheel
    
    - name: Build C++ components
      working-directory: godot-sandbox
      run: |
        mkdir -p build && cd build
        cmake .. -GNinja
        cmake --build . --config Release
    
    - name: Run unit tests
      working-directory: godot-sandbox
      run: |
        cd build
        ctest . --output-on-failure
    
    - name: Build Python bridge
      working-directory: python-bridge
      run: |
        pip install -e .[dev]
        pytest
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: godot-sandbox-build
        path: |
          godot-sandbox/build/*.so
          godot-sandbox/examples/*.elf
          python-bridge/dist/*
    
  windows-build:
    name: Build (Windows)
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel
    
    - name: Build C++ components
      working-directory: godot-sandbox
      run: |
        cmake -B build -GNinja
        cmake --build build --config Release
    
    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v4
      with:
        name: godot-sandbox-windows
        path: godot-sandbox/build/*.dll

  macos-build:
    name: Build (macOS)
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        brew install godot4 cmake ninja
        python -m pip install --upgrade pip
        pip install setuptools wheel
    
    - name: Build C++ components
      working-directory: godot-sandbox
      run: |
        cmake -B build -GNinja
        cmake --build build --config Release
    
    - name: Upload macOS artifacts
      uses: actions/upload-artifact@v4
      with:
        name: godot-sandbox-macos
        path: godot-sandbox/build/*.dylib
